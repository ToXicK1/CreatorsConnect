openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Bharat Creator Marketplace API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: creators
    description: Creator profiles
  - name: brands
    description: Brand profiles
  - name: campaigns
    description: Brand campaigns
  - name: applications
    description: Creator campaign applications
  - name: stats
    description: Platform statistics and analytics

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /creators:
    get:
      operationId: listCreators
      tags: [creators]
      summary: List all creators
      parameters:
        - name: category
          in: query
          schema:
            type: string
        - name: language
          in: query
          schema:
            type: string
        - name: platform
          in: query
          schema:
            type: string
        - name: minFollowers
          in: query
          schema:
            type: integer
        - name: maxFollowers
          in: query
          schema:
            type: integer
        - name: state
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of creators
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Creator"
    post:
      operationId: createCreator
      tags: [creators]
      summary: Create a creator profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCreatorBody"
      responses:
        "201":
          description: Created creator
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Creator"

  /creators/{id}:
    get:
      operationId: getCreator
      tags: [creators]
      summary: Get creator by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Creator details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Creator"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateCreator
      tags: [creators]
      summary: Update creator profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCreatorBody"
      responses:
        "200":
          description: Updated creator
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Creator"
    delete:
      operationId: deleteCreator
      tags: [creators]
      summary: Delete creator profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /brands:
    get:
      operationId: listBrands
      tags: [brands]
      summary: List all brands
      parameters:
        - name: industry
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of brands
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Brand"
    post:
      operationId: createBrand
      tags: [brands]
      summary: Create a brand profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBrandBody"
      responses:
        "201":
          description: Created brand
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Brand"

  /brands/{id}:
    get:
      operationId: getBrand
      tags: [brands]
      summary: Get brand by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Brand details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Brand"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateBrand
      tags: [brands]
      summary: Update brand profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBrandBody"
      responses:
        "200":
          description: Updated brand
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Brand"

  /campaigns:
    get:
      operationId: listCampaigns
      tags: [campaigns]
      summary: List all campaigns
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [open, closed, completed, draft]
        - name: category
          in: query
          schema:
            type: string
        - name: platform
          in: query
          schema:
            type: string
        - name: minBudget
          in: query
          schema:
            type: number
        - name: maxBudget
          in: query
          schema:
            type: number
        - name: brandId
          in: query
          schema:
            type: integer
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of campaigns
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Campaign"
    post:
      operationId: createCampaign
      tags: [campaigns]
      summary: Create a new campaign
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCampaignBody"
      responses:
        "201":
          description: Created campaign
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Campaign"

  /campaigns/{id}:
    get:
      operationId: getCampaign
      tags: [campaigns]
      summary: Get campaign by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Campaign details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Campaign"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateCampaign
      tags: [campaigns]
      summary: Update campaign
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCampaignBody"
      responses:
        "200":
          description: Updated campaign
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Campaign"
    delete:
      operationId: deleteCampaign
      tags: [campaigns]
      summary: Delete campaign
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /applications:
    get:
      operationId: listApplications
      tags: [applications]
      summary: List applications
      parameters:
        - name: campaignId
          in: query
          schema:
            type: integer
        - name: creatorId
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, accepted, rejected, completed]
      responses:
        "200":
          description: List of applications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Application"
    post:
      operationId: createApplication
      tags: [applications]
      summary: Apply to a campaign
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateApplicationBody"
      responses:
        "201":
          description: Created application
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Application"

  /applications/{id}:
    get:
      operationId: getApplication
      tags: [applications]
      summary: Get application by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Application details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Application"
    put:
      operationId: updateApplication
      tags: [applications]
      summary: Update application status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateApplicationBody"
      responses:
        "200":
          description: Updated application
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Application"

  /stats/platform:
    get:
      operationId: getPlatformStats
      tags: [stats]
      summary: Platform-wide statistics
      responses:
        "200":
          description: Platform stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformStats"

  /stats/top-creators:
    get:
      operationId: getTopCreators
      tags: [stats]
      summary: Get top creators by followers
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: Top creators
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Creator"

  /stats/trending-campaigns:
    get:
      operationId: getTrendingCampaigns
      tags: [stats]
      summary: Get trending/featured campaigns
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 6
      responses:
        "200":
          description: Trending campaigns
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Campaign"

  /stats/category-breakdown:
    get:
      operationId: getCategoryBreakdown
      tags: [stats]
      summary: Creator count by category
      responses:
        "200":
          description: Category breakdown
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CategoryCount"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required: [error]

    Creator:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        username:
          type: string
        bio:
          type: string
        profileImageUrl:
          type: string
          nullable: true
        category:
          type: string
        languages:
          type: array
          items:
            type: string
        state:
          type: string
        city:
          type: string
        platforms:
          type: array
          items:
            $ref: "#/components/schemas/PlatformStat"
        totalFollowers:
          type: integer
        engagementRate:
          type: number
        avgViews:
          type: integer
        ratePerPost:
          type: number
        ratePerReel:
          type: number
        ratePerVideo:
          type: number
        tags:
          type: array
          items:
            type: string
        verified:
          type: boolean
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - name
        - username
        - bio
        - category
        - languages
        - state
        - city
        - platforms
        - totalFollowers
        - engagementRate
        - avgViews
        - ratePerPost
        - ratePerReel
        - ratePerVideo
        - tags
        - verified
        - createdAt
        - updatedAt

    PlatformStat:
      type: object
      properties:
        platform:
          type: string
          enum: [instagram, youtube, twitter, linkedin, moj, sharechat, josh, snapchat]
        handle:
          type: string
        followers:
          type: integer
        profileUrl:
          type: string
      required: [platform, handle, followers, profileUrl]

    CreateCreatorBody:
      type: object
      properties:
        name:
          type: string
        username:
          type: string
        bio:
          type: string
        profileImageUrl:
          type: string
          nullable: true
        category:
          type: string
        languages:
          type: array
          items:
            type: string
        state:
          type: string
        city:
          type: string
        platforms:
          type: array
          items:
            $ref: "#/components/schemas/PlatformStat"
        ratePerPost:
          type: number
        ratePerReel:
          type: number
        ratePerVideo:
          type: number
        tags:
          type: array
          items:
            type: string
      required:
        - name
        - username
        - bio
        - category
        - languages
        - state
        - city
        - platforms
        - ratePerPost
        - ratePerReel
        - ratePerVideo
        - tags

    UpdateCreatorBody:
      type: object
      properties:
        name:
          type: string
        bio:
          type: string
        profileImageUrl:
          type: string
          nullable: true
        category:
          type: string
        languages:
          type: array
          items:
            type: string
        state:
          type: string
        city:
          type: string
        platforms:
          type: array
          items:
            $ref: "#/components/schemas/PlatformStat"
        ratePerPost:
          type: number
        ratePerReel:
          type: number
        ratePerVideo:
          type: number
        tags:
          type: array
          items:
            type: string

    Brand:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        logoUrl:
          type: string
          nullable: true
        industry:
          type: string
        description:
          type: string
        website:
          type: string
        contactEmail:
          type: string
        totalCampaigns:
          type: integer
        activeCampaigns:
          type: integer
        totalSpent:
          type: number
        verified:
          type: boolean
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - name
        - industry
        - description
        - website
        - contactEmail
        - totalCampaigns
        - activeCampaigns
        - totalSpent
        - verified
        - createdAt
        - updatedAt

    CreateBrandBody:
      type: object
      properties:
        name:
          type: string
        logoUrl:
          type: string
          nullable: true
        industry:
          type: string
        description:
          type: string
        website:
          type: string
        contactEmail:
          type: string
      required:
        - name
        - industry
        - description
        - website
        - contactEmail

    UpdateBrandBody:
      type: object
      properties:
        name:
          type: string
        logoUrl:
          type: string
          nullable: true
        industry:
          type: string
        description:
          type: string
        website:
          type: string
        contactEmail:
          type: string

    Campaign:
      type: object
      properties:
        id:
          type: integer
        brandId:
          type: integer
        brandName:
          type: string
        brandLogoUrl:
          type: string
          nullable: true
        title:
          type: string
        description:
          type: string
        brief:
          type: string
        category:
          type: string
        platforms:
          type: array
          items:
            type: string
        deliverables:
          type: array
          items:
            type: string
        budget:
          type: number
        budgetType:
          type: string
          enum: [fixed, per_creator, negotiable]
        targetLanguages:
          type: array
          items:
            type: string
        targetStates:
          type: array
          items:
            type: string
        minFollowers:
          type: integer
        deadline:
          type: string
        status:
          type: string
          enum: [open, closed, completed, draft]
        applicationCount:
          type: integer
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - brandId
        - brandName
        - title
        - description
        - brief
        - category
        - platforms
        - deliverables
        - budget
        - budgetType
        - targetLanguages
        - targetStates
        - minFollowers
        - deadline
        - status
        - applicationCount
        - createdAt
        - updatedAt

    CreateCampaignBody:
      type: object
      properties:
        brandId:
          type: integer
        title:
          type: string
        description:
          type: string
        brief:
          type: string
        category:
          type: string
        platforms:
          type: array
          items:
            type: string
        deliverables:
          type: array
          items:
            type: string
        budget:
          type: number
        budgetType:
          type: string
          enum: [fixed, per_creator, negotiable]
        targetLanguages:
          type: array
          items:
            type: string
        targetStates:
          type: array
          items:
            type: string
        minFollowers:
          type: integer
        deadline:
          type: string
        status:
          type: string
          enum: [open, closed, completed, draft]
      required:
        - brandId
        - title
        - description
        - brief
        - category
        - platforms
        - deliverables
        - budget
        - budgetType
        - targetLanguages
        - targetStates
        - minFollowers
        - deadline
        - status

    UpdateCampaignBody:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        brief:
          type: string
        category:
          type: string
        platforms:
          type: array
          items:
            type: string
        deliverables:
          type: array
          items:
            type: string
        budget:
          type: number
        budgetType:
          type: string
          enum: [fixed, per_creator, negotiable]
        targetLanguages:
          type: array
          items:
            type: string
        targetStates:
          type: array
          items:
            type: string
        minFollowers:
          type: integer
        deadline:
          type: string
        status:
          type: string
          enum: [open, closed, completed, draft]

    Application:
      type: object
      properties:
        id:
          type: integer
        campaignId:
          type: integer
        creatorId:
          type: integer
        creatorName:
          type: string
        creatorUsername:
          type: string
        creatorProfileImageUrl:
          type: string
          nullable: true
        campaignTitle:
          type: string
        brandName:
          type: string
        pitch:
          type: string
        proposedRate:
          type: number
          nullable: true
        status:
          type: string
          enum: [pending, accepted, rejected, completed]
        notes:
          type: string
          nullable: true
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - campaignId
        - creatorId
        - creatorName
        - creatorUsername
        - campaignTitle
        - brandName
        - pitch
        - status
        - createdAt
        - updatedAt

    CreateApplicationBody:
      type: object
      properties:
        campaignId:
          type: integer
        creatorId:
          type: integer
        pitch:
          type: string
        proposedRate:
          type: number
          nullable: true
      required:
        - campaignId
        - creatorId
        - pitch

    UpdateApplicationBody:
      type: object
      properties:
        status:
          type: string
          enum: [pending, accepted, rejected, completed]
        notes:
          type: string
          nullable: true

    PlatformStats:
      type: object
      properties:
        totalCreators:
          type: integer
        totalBrands:
          type: integer
        totalCampaigns:
          type: integer
        openCampaigns:
          type: integer
        totalApplications:
          type: integer
        totalCollaborations:
          type: integer
        totalReachCrore:
          type: number
        averageEngagementRate:
          type: number
      required:
        - totalCreators
        - totalBrands
        - totalCampaigns
        - openCampaigns
        - totalApplications
        - totalCollaborations
        - totalReachCrore
        - averageEngagementRate

    CategoryCount:
      type: object
      properties:
        category:
          type: string
        count:
          type: integer
      required: [category, count]
